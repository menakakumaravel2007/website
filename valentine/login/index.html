<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Valentine's Day — Enter Code</title>
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="page-wrap">
    <div class="glass-card">
      <div class="title-script">Happy Valentine's Day</div>
      <div class="subtitle">Enter your Secret Code</div>

      <form id="loginForm" autocomplete="off">
        <input type="password" id="secretCode" placeholder="Secret Code" />
        <div class="error-msg" id="errorMsg">That's not quite it... try again 💔</div>
        <button type="submit" class="btn">Unlock ❤</button>
      </form>
    </div>
    <footer class="page-foot">Made with love, just for you</footer>
  </div>

  <script src="../shared.js"></script>
  <script src="login.js"></script>
</body>
</html>
